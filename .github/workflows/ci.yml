name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/grafix tests
      - name: Mypy
        run: mypy src/grafix
      - name: Pytest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: src
        run: pytest -q -p no:cacheprovider

  performance-smoke:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Deterministic benchmark smoke
        run: >-
          python -m grafix benchmark run
          --suite smoke
          --profile smoke
          --samples 3
          --run-id 20000101_000000
          --out "${{ runner.temp }}/grafix-benchmark"
      - name: Offline benchmark report
        if: always()
        run: >-
          python -m grafix benchmark report
          --out "${{ runner.temp }}/grafix-benchmark"
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grafix-benchmark-smoke
          path: |
            ${{ runner.temp }}/grafix-benchmark/runs/*.json
            ${{ runner.temp }}/grafix-benchmark/report.html
            ${{ runner.temp }}/grafix-benchmark/warnings.json
          if-no-files-found: error

  performance-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Full cold and warm benchmark
        run: >-
          python -m grafix benchmark run
          --suite all
          --profile long
          --mode warm
          --run-id 20000101_000000
          --out "${{ runner.temp }}/grafix-benchmark"
      - name: Compile-cold representative cases
        run: >-
          python -m grafix benchmark run
          --case effect.translate.line_small
          --case core.concat_recipe.parts_1000
          --profile smoke
          --mode compile-cold
          --run-id 20000101_000001
          --out "${{ runner.temp }}/grafix-benchmark"
      - name: Offline benchmark report
        if: always()
        run: >-
          python -m grafix benchmark report
          --out "${{ runner.temp }}/grafix-benchmark"
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grafix-benchmark-full
          path: |
            ${{ runner.temp }}/grafix-benchmark/runs/*.json
            ${{ runner.temp }}/grafix-benchmark/report.html
            ${{ runner.temp }}/grafix-benchmark/warnings.json
          if-no-files-found: error
