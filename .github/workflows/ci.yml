name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/grafix tests
      - name: Mypy
        run: mypy src/grafix
      - name: Pytest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: src
        run: pytest -q -p no:cacheprovider

  performance-smoke:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Deterministic benchmark smoke
        run: >-
          python -m grafix benchmark
          --only rotate,scale
          --cases line_small
          --repeats 3
          --warmup 1
          --cold-processes 0
          --run-id 20000101_000000
          --out "${{ runner.temp }}/grafix-benchmark"
      - name: System benchmark smoke
        run: >-
          python -m grafix benchmark
          --system
          --repeats 1
          --warmup 0
          --cold-processes 0
          --run-id 20000101_000001
          --out "${{ runner.temp }}/grafix-benchmark"

  performance-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Full cold and warm benchmark
        run: >-
          python -m grafix benchmark
          --repeats 10
          --warmup 2
          --cold-processes 5
          --run-id 20000101_000000
          --out "${{ runner.temp }}/grafix-benchmark"
      - name: Long system benchmark
        run: >-
          python -m grafix benchmark
          --system-long
          --repeats 5
          --warmup 1
          --cold-processes 0
          --run-id 20000101_000001
          --out "${{ runner.temp }}/grafix-benchmark"
